name: CI — BEACON Protocol

on:
  push:
    branches: [main, "claude/**", "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Backend: lint + tests unitarios (sin Supabase)
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Run unit tests (no Supabase, no .env required)
        # Las variables mínimas evitan ValidationError de config.py
        # sin conectar a ningún servicio real.
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_KEY: placeholder-anon-key
          SUPABASE_SERVICE_KEY: placeholder-service-key
          DATABASE_URL: postgresql://placeholder:placeholder@localhost/placeholder
          JWT_SECRET_KEY: ci-placeholder-secret-key-minimum-32-chars-ok
          RUT_HASH_SALT: ci-placeholder-salt-16c
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # Frontend: type-check + lint
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Type-check (tsc)
        run: npx tsc --noEmit

      - name: Lint (eslint)
        run: npm run lint
